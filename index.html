<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2a1b32" />
    <link rel="stylesheet" href="/Kitty_Idle/sprite-fix.css" />
    <link rel="stylesheet" href="/Kitty_Idle/start-screen.css" />
    <title>Kitty Idle</title>
    <script src="/Kitty_Idle/startup.js"></script>
  </head>
  <body>
    <div id="start-screen">
      <section class="start-panel" aria-label="Kitty Idle Startbildschirm">
        <h1 class="start-logo">KITTY<br />IDLE</h1>
        <p class="start-subtitle">Züchte deine eigene Katzenfamilie</p>
        <div class="start-kittens" aria-hidden="true">
          <div class="start-kitten one"></div>
          <div class="start-kitten two"></div>
        </div>
        <div class="start-buttons">
          <button id="continue-game" type="button">🐾 Weiterspielen</button>
          <button id="new-game" class="new-game" type="button">🧺 Neues Spiel</button>
        </div>
        <small class="start-note">Babykatzen wachsen mit der Zeit zu erwachsenen Zuchtkatzen heran.</small>
      </section>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="/Kitty_Idle/start-screen.js"></script>
  </body>
</html>
